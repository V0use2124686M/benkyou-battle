<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>べんきょうバトル</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: "Hiragino Maru Gothic ProN", "BIZ UDGothic", "Yu Gothic", "Meiryo", sans-serif;
    background: linear-gradient(180deg, #2b1b5e 0%, #4a2c8f 60%, #6a3fb5 100%);
    color: #fff;
    display: flex;
    justify-content: center;
    min-height: 100%;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  #app {
    width: 100%;
    max-width: 480px;
    height: 100vh;
    height: 100dvh; /* スマホのアドレスバーぶんを除いた高さに収める */
    display: flex;
    flex-direction: column;
    padding: 8px 12px;
    position: relative;
    overflow: hidden;
  }

  /* ===== タイトルがめん ===== */
  #titleScreen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 9px;
    text-align: center;
    overflow-y: auto;
    padding: 6px 0;
  }
  .gameTitle {
    font-size: 32px;
    font-weight: bold;
    line-height: 1.25;
    text-shadow: 3px 3px 0 #1a0f3d, -1px -1px 0 #ff69b4;
    animation: titleBounce 2s ease-in-out infinite;
  }
  @keyframes titleBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .titleMonsters { font-size: 32px; letter-spacing: 4px; }
  .modeBtn {
    width: 100%;
    padding: 10px 12px;
    font-size: 18px;
    font-weight: bold;
    font-family: inherit;
    border: 4px solid #fff;
    border-radius: 16px;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,.35);
    transition: transform .1s;
  }
  .modeBtn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,.35); }
  #btnMul { background: linear-gradient(180deg, #ff8a5c, #f4511e); }
  #btnDiv { background: linear-gradient(180deg, #5cc9ff, #1e88e5); }
  #btnKanji { background: linear-gradient(180deg, #7ee081, #2e9e46); }
  #btnGeo { background: linear-gradient(180deg, #4dd0e1, #00838f); }
  #btnEn { background: linear-gradient(180deg, #ffb74d, #ef6c00); }
  .modeBtn small { display: block; font-size: 11px; font-weight: normal; margin-top: 2px; opacity: .95; }
  .bestScore { font-size: 12px; color: #ffe082; margin-top: 2px; }
  #btnResetScore {
    font-family: inherit;
    font-size: 13px;
    font-weight: bold;
    color: #fff;
    background: rgba(255,255,255,.15);
    border: 2px solid rgba(255,255,255,.6);
    border-radius: 10px;
    padding: 6px 14px;
    cursor: pointer;
    margin-top: 2px;
  }
  #btnResetScore:active { transform: translateY(2px); }
  #btnResetScore.arm { background: #d32f2f; border-color: #fff; animation: comboPop .3s; }

  /* ===== ゲームがめん ===== */
  #gameScreen { flex: 1; display: none; flex-direction: column; gap: 6px; min-height: 0; }

  #topBar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
    font-weight: bold;
    gap: 6px;
  }
  #btnQuit {
    font-family: inherit;
    font-size: 13px;
    font-weight: bold;
    color: #fff;
    background: rgba(255,255,255,.15);
    border: 2px solid #fff;
    border-radius: 10px;
    padding: 4px 10px;
    cursor: pointer;
  }
  #btnQuit:active { transform: translateY(2px); }
  #comboLabel { color: #ffd54f; min-height: 22px; }
  #comboLabel.hot { animation: comboPop .3s; }
  @keyframes comboPop {
    0% { transform: scale(1.6); }
    100% { transform: scale(1); }
  }

  /* モンスター */
  #monsterArea {
    background: rgba(0,0,0,.25);
    border-radius: 18px;
    padding: 6px 10px;
    text-align: center;
    position: relative;
    overflow: hidden;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  #monsterName { font-size: 16px; font-weight: bold; flex-shrink: 0; }
  #monsterBox {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  #monsterImg { max-height: 100%; max-width: 100%; object-fit: contain; display: none; }
  #monsterEmoji { font-size: 76px; line-height: 1; }
  #monsterBox.shake { animation: shake .4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-12px) rotate(-6deg); }
    40% { transform: translateX(10px) rotate(5deg); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(6px); }
  }
  #monsterBox.attack { animation: monAttack .45s; }
  @keyframes monAttack {
    0%, 100% { transform: translateY(0) scale(1); }
    40% { transform: translateY(26px) scale(1.25); }
  }
  #monsterBox.defeated { animation: defeat .7s forwards; }
  @keyframes defeat {
    0% { transform: rotate(0) scale(1); opacity: 1; }
    100% { transform: rotate(360deg) scale(0); opacity: 0; }
  }
  #monsterBox.appear { animation: appear .5s; }
  @keyframes appear {
    0% { transform: scale(0); }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .hpBarOuter {
    background: rgba(0,0,0,.5);
    border: 2px solid #fff;
    border-radius: 10px;
    height: 14px;
    overflow: hidden;
    margin-top: 4px;
    flex-shrink: 0;
  }
  .hpBarInner {
    height: 100%;
    border-radius: 6px;
    transition: width .4s;
  }
  #monsterHpBar { background: linear-gradient(90deg, #ff5252, #ff1744); width: 100%; }
  #playerHpBar { background: linear-gradient(90deg, #69f0ae, #00c853); width: 100%; }
  .dmgPop {
    position: absolute;
    left: 50%;
    top: 40%;
    transform: translateX(-50%);
    font-size: 34px;
    font-weight: bold;
    color: #ffeb3b;
    text-shadow: 2px 2px 0 #b71c1c;
    pointer-events: none;
    animation: dmgFloat .8s forwards;
    z-index: 5;
  }
  @keyframes dmgFloat {
    0% { opacity: 1; transform: translate(-50%, 0) scale(1.4); }
    100% { opacity: 0; transform: translate(-50%, -55px) scale(1); }
  }

  /* プレイヤー */
  #playerArea {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,0,0,.25);
    border-radius: 14px;
    padding: 5px 12px;
  }
  #playerFace { font-size: 28px; }
  #playerArea.hurt { animation: hurtFlash .5s; }
  @keyframes hurtFlash {
    0%, 100% { background: rgba(0,0,0,.25); }
    30% { background: rgba(255,0,0,.55); transform: translateX(-6px); }
    60% { transform: translateX(6px); }
  }
  #playerHpWrap { flex: 1; }
  #playerHpText { font-size: 13px; font-weight: bold; }

  /* もんだい */
  #questionArea {
    background: #fffde7;
    color: #333;
    border-radius: 18px;
    padding: 8px;
    text-align: center;
    min-height: 78px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    box-shadow: 0 4px 0 rgba(0,0,0,.3);
  }
  #questionLabel { font-size: 14px; color: #7b5e00; font-weight: bold; }
  #questionMain { font-size: 38px; font-weight: bold; line-height: 1.2; }
  #questionMain.kanjiBig { font-size: 52px; }
  #questionMain.textQ { font-size: 16px; line-height: 1.45; text-align: left; padding: 2px 4px; }
  #questionMain.symbolQ { display: flex; align-items: center; justify-content: center; }
  .symSvg { width: 92px; height: 92px; }
  .symGlyph { font-size: 64px; line-height: 1; }
  /* えいたんご + カタカナフリガナ */
  #questionMain.enQ { display: flex; align-items: center; justify-content: center; }
  .enWord { display: inline-flex; flex-direction: column; align-items: center; line-height: 1.1; }
  #questionMain .enMain { font-size: 40px; font-weight: bold; }
  #questionMain .enKana { font-size: 16px; color: #9c6f00; margin-top: 3px; font-weight: bold; }
  .choiceBtn .enWord .enMain { font-size: 21px; }
  .choiceBtn .enWord .enMainJa { font-size: 18px; }
  .choiceBtn .enWord .enKana { font-size: 10px; opacity: .92; font-weight: normal; margin-top: 1px; }
  /* こたえる まえは よみの 場所だけ とって かくす (レイアウトを うごかさない) */
  .choiceBtn.hideReading .enKana { visibility: hidden; }

  /* メッセージ */
  #message {
    text-align: center;
    font-size: 17px;
    font-weight: bold;
    min-height: 24px;
    text-shadow: 2px 2px 0 rgba(0,0,0,.5);
  }
  #message.good { color: #ffee58; animation: comboPop .3s; }
  #message.bad { color: #ff8a80; }

  /* こたえボタン */
  #choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding-bottom: 2px;
  }
  .choiceBtn {
    padding: 12px 6px;
    font-size: 24px;
    font-weight: bold;
    font-family: inherit;
    border: 4px solid #fff;
    border-radius: 16px;
    background: linear-gradient(180deg, #ba8bfa, #7c4dff);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,.35);
    transition: transform .1s;
    min-height: 56px;
  }
  .choiceBtn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,.35); }
  .choiceBtn:disabled { opacity: .85; }
  .choiceBtn.correct { background: linear-gradient(180deg, #66bb6a, #2e7d32); animation: comboPop .3s; }
  .choiceBtn.wrong { background: linear-gradient(180deg, #ef5350, #b71c1c); }

  /* ゲームオーバー */
  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(10, 5, 30, .88);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    border-radius: 12px;
    z-index: 20;
    padding: 20px;
  }
  #overlay .bigFace { font-size: 70px; }
  #overlay h2 { font-size: 34px; color: #ff8a80; text-shadow: 2px 2px 0 #000; }
  #overlay .resultLine { font-size: 20px; }
  #overlay .resultLine b { color: #ffd54f; font-size: 26px; }
  #newRecord { color: #ffee58; font-size: 20px; font-weight: bold; display: none; animation: titleBounce 1s infinite; }
  .ovBtn {
    width: 80%;
    padding: 16px;
    font-size: 22px;
    font-weight: bold;
    font-family: inherit;
    border: 4px solid #fff;
    border-radius: 16px;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,.35);
  }
  .ovBtn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,.35); }
  #btnRetry { background: linear-gradient(180deg, #ff8a5c, #f4511e); }
  #btnToTitle { background: linear-gradient(180deg, #5cc9ff, #1e88e5); }

  /* かちどき (たおしたあとの モンスターエリアに かさねて だす) */
  #winBanner {
    position: absolute;
    left: 0; right: 0; top: 32px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    color: #ffee58;
    text-shadow: 3px 3px 0 #e65100;
    pointer-events: none;
    display: none;
    z-index: 10;
    animation: comboPop .4s;
  }
</style>
</head>
<body>
<div id="app">

  <!-- タイトル -->
  <div id="titleScreen">
    <div class="titleMonsters">👾🐲👻</div>
    <div class="gameTitle">べんきょう<br>バトル</div>
    <div style="font-size:13px;">もんだいに こたえて モンスターを たおそう!</div>
    <button class="modeBtn" id="btnMul">✖ かけ算モード<small>九九で たたかう!</small><span class="bestScore" id="bestMul"></span></button>
    <button class="modeBtn" id="btnDiv">➗ わり算モード<small>わり算で たたかう!</small><span class="bestScore" id="bestDiv"></span></button>
    <button class="modeBtn" id="btnKanji">📖 かんじモード<small>かんじの よみかたで たたかう!</small><span class="bestScore" id="bestKanji"></span></button>
    <button class="modeBtn" id="btnGeo">🗾 ちりモード<small>とどうふけんと けんちょうしょざいちで たたかう!</small><span class="bestScore" id="bestGeo"></span></button>
    <button class="modeBtn" id="btnEn">🔤 えいごモード<small>えいたんごの いみで たたかう!</small><span class="bestScore" id="bestEn"></span></button>
    <button id="btnResetScore">🗑 スコアを リセット</button>
  </div>

  <!-- バトル -->
  <div id="gameScreen">
    <div id="topBar">
      <span id="scoreLabel">スコア 0</span>
      <span id="comboLabel"></span>
      <span id="levelLabel">レベル 1</span>
      <button id="btnQuit">やめる</button>
    </div>

    <div id="monsterArea">
      <div id="monsterName">モンスター</div>
      <div id="monsterBox">
        <img id="monsterImg" alt="">
        <div id="monsterEmoji">👾</div>
      </div>
      <div class="hpBarOuter"><div class="hpBarInner" id="monsterHpBar"></div></div>
      <div id="winBanner"></div>
    </div>

    <div id="playerArea">
      <span id="playerFace">🧒</span>
      <div id="playerHpWrap">
        <div id="playerHpText">きみの HP 100/100</div>
        <div class="hpBarOuter"><div class="hpBarInner" id="playerHpBar"></div></div>
      </div>
    </div>

    <div id="questionArea">
      <div id="questionLabel"></div>
      <div id="questionMain"></div>
    </div>

    <div id="message"></div>

    <div id="choices">
      <button class="choiceBtn"></button>
      <button class="choiceBtn"></button>
      <button class="choiceBtn"></button>
      <button class="choiceBtn"></button>
    </div>
  </div>

  <!-- けっか (ゲームオーバー / とちゅうしゅうりょう) -->
  <div id="overlay">
    <div class="bigFace" id="overlayFace">😵</div>
    <h2 id="overlayTitle">ゲームオーバー</h2>
    <div class="resultLine">スコア <b id="finalScore">0</b></div>
    <div class="resultLine">たおした かず <b id="finalKills">0</b></div>
    <div class="resultLine">さいこうコンボ <b id="finalCombo">0</b></div>
    <div id="newRecord">🎉 しんきろく! 🎉</div>
    <button class="ovBtn" id="btnRetry">もういちど</button>
    <button class="ovBtn" id="btnToTitle">モードをえらぶ</button>
  </div>

</div>

<script>
"use strict";

/* ==================== かんじデータ (小2・小3・小4) ====================
   [かんじ, せいかい, [まちがい1, まちがい2, まちがい3]]
   1〜3文字のことば。がくねんごとに 3つの配列に わけている。 */
var KANJI_G2 = [
  ["星","ほし",["つき","そら","くも"]],
  ["雪","ゆき",["あめ","くも","こおり"]],
  ["船","ふね",["くるま","はし","うみ"]],
  ["馬","うま",["うし","とり","しか"]],
  ["魚","さかな",["とり","むし","かい"]],
  ["鳥","とり",["むし","うま","さかな"]],

/* 小3ちゅうしん */
var KANJI_G3 = [
  ["岸","きし",["うみ","はま","なみ"]],
  ["波","なみ",["うみ","かぜ","みず"]],

/* ==================== おと (Web Audio) ==================== */
var audioCtx = null;
function ensureAudio() {
  try {
    if (!audioCtx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  } catch (e) { audioCtx = null; }
}
function beep(freq, start, dur, type, vol) {
  if (!audioCtx) return;
  try {
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = type || "square";
    o.frequency.value = freq;
    var t = audioCtx.currentTime + start;
    g.gain.setValueAtTime(vol || 0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + dur + 0.05);
  } catch (e) {}
}
var SFX = {
  tap:     function(){ beep(600, 0, 0.06, "square", 0.06); },
  correct: function(){ beep(660, 0, 0.1); beep(880, 0.09, 0.12); beep(1320, 0.18, 0.18); },
  wrong:   function(){ beep(200, 0, 0.25, "sawtooth"); beep(150, 0.15, 0.3, "sawtooth"); },
  win:     function(){ beep(523, 0, 0.12); beep(659, 0.1, 0.12); beep(784, 0.2, 0.12); beep(1047, 0.3, 0.3); },
  lose:    function(){ beep(400, 0, 0.2, "triangle"); beep(300, 0.2, 0.2, "triangle"); beep(200, 0.4, 0.5, "triangle"); },
  hurt:    function(){ beep(120, 0, 0.2, "sawtooth", 0.15); }
};

/* むずかしさ: 0 = レベル1〜6, 1 = レベル7〜8, 2 = レベル9〜 (さいこう難度) */
function difficulty() {
  if (state.monsterIndex >= 8) return 2;
  if (state.monsterIndex >= 6) return 1;
  return 0;
}

var $ = function(id) { return document.getElementById(id); };

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
  return arr;
}
function rand(n) { return Math.floor(Math.random() * n); }
function hasOkurigana(s) { return /[぀-ゟ]/.test(s); }

function getBest(mode) {
  try { return parseInt(localStorage.getItem(MODES[mode].storageKey) || "0", 10) || 0; }
  catch (e) { return 0; }
}
function setBest(mode, v) {
  try { localStorage.setItem(MODES[mode].storageKey, String(v)); } catch (e) {}
}

var resetArmTimer = null;
function disarmResetBtn() {
  clearTimeout(resetArmTimer);
  var btn = $("btnResetScore");
  btn.classList.remove("arm");
  btn.textContent = "🗑 スコアを リセット";
}
function onResetScore() {
  ensureAudio();
  SFX.tap();
  var btn = $("btnResetScore");
  if (!btn.classList.contains("arm")) {
    btn.classList.add("arm");
    btn.textContent = "ほんとうに リセットする?";
    resetArmTimer = setTimeout(disarmResetBtn, 3000);
    return;
  }
  try {
    localStorage.removeItem(MODES.mul.storageKey);
    localStorage.removeItem(MODES.div.storageKey);
    localStorage.removeItem(MODES.kanji.storageKey);
    localStorage.removeItem(MODES.geo.storageKey);
    localStorage.removeItem(MODES.en.storageKey);
  } catch (e) {}
  showTitle();
}

  $("playerHpText").textContent = "きみの HP " + Math.max(0, state.playerHp) + "/" + state.playerMaxHp;

/* ==================== もんだいづくり ==================== */
function makeQuestion() {
  if (state.mode === "mul") return makeMulQuestion();
  if (state.mode === "div") return makeDivQuestion();
  if (state.mode === "geo") return makeGeoQuestion();
  if (state.mode === "en") return makeEnglishQuestion();
  return makeKanjiQuestion();
}

function makeMulQuestion() {
  var d = difficulty();
  // さいこう難度では ときどき 文しょうだい
  if (d === 2 && Math.random() < 0.35) return makeTextQuestion("mul");
  var a, b, key;
  do {
    if (d === 0) {
      // 九九ぜんぶ
      a = 1 + rand(9); b = 1 + rand(9);
    } else if (rand(2) === 0) {
      // むずかしい九九 (4〜9のだん)
      a = 4 + rand(6); b = 4 + rand(6);
    } else {
      // 2けた × 1けた
      a = 11 + rand(d === 2 ? 39 : 19); b = 2 + rand(8);
    }
    key = a + "x" + b;
  } while (key === state.lastQuestionKey);
  state.lastQuestionKey = key;
  var ans = a * b;
  var wrongs = collectWrongNumbers(ans, [
    a * (b + 1), a * (b - 1), (a + 1) * b, (a - 1) * b,
    ans + a, ans - a, ans + 1, ans - 1, ans + 2, ans + 10
  ]);
  return {
    label: "けいさん しよう!",
    main: a + " × " + b + " = ?",
    big: false,
    answer: String(ans),
    choices: shuffle([String(ans), wrongs[0], wrongs[1], wrongs[2]])
  };
}

function makeDivQuestion() {
  var d = difficulty();
  // さいこう難度では ときどき 文しょうだい
  if (d === 2 && Math.random() < 0.35) return makeTextQuestion("div");
  var a, b, key;
  do {
    if (d === 0) {
      a = 1 + rand(9); b = 1 + rand(9);
    } else if (rand(2) === 0) {
      // 九九のはんい (わる数も こたえも 4いじょう)
      a = 4 + rand(6); b = 4 + rand(6);
    } else {
      // 2けた ÷ 1けた (こたえも 2けた、わられる数は 99まで)
      a = 2 + rand(8);
      b = 10 + rand(Math.floor(99 / a) - 9);
    }
    key = (a * b) + "/" + a;
  } while (key === state.lastQuestionKey);
  state.lastQuestionKey = key;
  var ans = b; // (a*b) ÷ a = b
  var wrongs = collectWrongNumbers(ans, [
    ans + 1, ans - 1, ans + 2, ans - 2, ans + 3, ans - 3, ans + 4, 10 - ans
  ]);
  return {
    label: "けいさん しよう!",
    main: (a * b) + " ÷ " + a + " = ?",
    big: false,
    answer: String(ans),
    choices: shuffle([String(ans), wrongs[0], wrongs[1], wrongs[2]])
  };
}

/* さいこう難度で ランダムに でる 文しょうだい */
var TEXT_MUL = [
  function(a, b) { return "1はこに あめが " + a + "こずつ はいっています。" + b + "はこでは ぜんぶで なんこ?"; },
  function(a, b) { return "1だいに " + a + "にん のれる くるまが " + b + "だい あります。ぜんぶで なんにん のれる?"; },
  function(a, b) { return "1こ " + a + "えんの ガムを " + b + "こ かいます。ぜんぶで なんえん?"; },
  function(a, b) { return "1チーム " + a + "にんで " + b + "チーム つくります。みんなで なんにん?"; }
];
var TEXT_DIV = [
  function(a, b) { return (a * b) + "この いちごを " + a + "にんで おなじ かずずつ わけます。1人ぶんは なんこ?"; },
  function(a, b) { return (a * b) + "ページの ほんを 1日に " + a + "ページずつ よみます。なん日で よみおわる?"; },
  function(a, b) { return (a * b) + "えん もっています。1こ " + a + "えんの おかしは なんこ かえる?"; },
  function(a, b) { return (a * b) + "cmの リボンを " + a + "cmずつ きります。なん本に わけられる?"; }
];
function makeTextQuestion(kind) {
  var list = kind === "mul" ? TEXT_MUL : TEXT_DIV;
  var a, b, t, key;
  do {
    a = 2 + rand(8); b = 2 + rand(8);
    t = rand(list.length);
    key = kind + "T" + t + ":" + a + "," + b;
  } while (key === state.lastQuestionKey);
  state.lastQuestionKey = key;
  var ans = kind === "mul" ? a * b : b;
  var wrongs = collectWrongNumbers(ans, kind === "mul"
    ? [a * (b + 1), a * (b - 1), ans + a, ans - a, ans + 1, ans - 1]
    : [ans + 1, ans - 1, ans + 2, ans - 2, a, a + b]);
  return {
    label: "ぶんしょうだい だ!",
    main: list[t](a, b),
    big: false,
    text: true,
    answer: String(ans),
    choices: shuffle([String(ans), wrongs[0], wrongs[1], wrongs[2]])
  };
}

function collectWrongNumbers(ans, candidates) {
  var out = [];
  var used = { };
  used[ans] = true;
  var i, v;
  for (i = 0; i < candidates.length && out.length < 3; i++) {
    v = candidates[i];
    if (v >= 1 && !used[v]) { used[v] = true; out.push(String(v)); }
  }
  while (out.length < 3) {
    v = ans + (rand(19) - 9);
    if (v >= 1 && !used[v]) { used[v] = true; out.push(String(v)); }
  }
  return shuffle(out);
}

function makeKanjiQuestion() {
  // レベルが あがると 小2 → 小3 → 小3+小4 の かんじに かわる
  // (さいこう難度は 小3と小4を まぜて プールを ひろくする)
  var d = difficulty();
  if (kanjiDeck.length === 0 || kanjiDeckTier !== d) {
    kanjiPool = d === 2 ? KANJI_G3.concat(KANJI_G4) :
                d === 1 ? KANJI_G3.slice() :
                          KANJI_G2.slice();
    kanjiDeck = shuffle(kanjiPool.slice());
    kanjiDeckTier = d;
  }
  var item = kanjiDeck.pop();
  // よみ→かんじ の ぎゃくもんだいも 半分の かくりつで だす
  if (rand(2) === 0) return makeReadingToKanjiQuestion(item);
  return {
    label: "この かんじの よみかたは?",
    main: item[0],
    big: true,
    answer: item[1],
    choices: shuffle([item[1], item[2][0], item[2][1], item[2][2]])
  };
}

function makeReadingToKanjiQuestion(item) {
  // まちがい候補は おなじプールの べつの かんじから えらぶ。
  // おなじ よみの かんじ (例: 街/町 = まち) は 正解が 2つに なるので のぞく。
  // 送り仮名の あり・なしは まぜない (例: 「おる」の こたえに 送り仮名なしの
  // かんじが まざると 見た目で こたえが わかってしまう)。
  var itemHasOku = hasOkurigana(item[0]);
  var others = kanjiPool.filter(function(e) {
    return e[0] !== item[0] && e[1] !== item[1] && hasOkurigana(e[0]) === itemHasOku;
  });
  // 文字数が おなじものを ゆうせん (見た目で わからないように)
  var sameLen = others.filter(function(e) { return e[0].length === item[0].length; });
  var pool = sameLen.length >= 3 ? sameLen : others;
  var wrongs = shuffle(pool.slice()).slice(0, 3).map(function(e) { return e[0]; });
  return {
    label: "この よみかたの かんじは?",
    main: item[1],
    big: item[1].length <= 4,
    answer: item[0],
    choices: shuffle([item[0], wrongs[0], wrongs[1], wrongs[2]])
  };
}

function ensureGeoPool() {
  // レベルが あがると なじみの あるものだけ → ぜんこくの とどうふけんに かわる
  var d = difficulty();
  if (geoDeck.length === 0 || geoDeckTier !== d) {
    geoPool = d === 2 ? GEO_MED.concat(GEO_HARD) :
              d === 1 ? GEO_MED.slice() :
                        GEO_EASY.slice();
    geoDeck = shuffle(geoPool.slice());
    geoDeckTier = d;
  }
}

function makeGeoQuestion() {
  ensureGeoPool();
  // とどうふけん・けんちょうしょざいちを メインに、地方/地図記号/せかいの国も まぜて だす
  var roll = rand(100);
  if (roll < 20) return makeRegionQuestion();
  if (roll < 40) return makeSymbolQuestion();
  if (roll < 60) return makeCountryQuestion();
  return makeGeoPrefQuestion();
}

function makeGeoPrefQuestion() {
  var item = geoDeck.pop();
  // とどうふけん→けんちょうしょざいち と ぎゃく(けんちょうしょざいち→とどうふけん)を 半分ずつ だす
  if (rand(2) === 0) return makeCapitalToPrefQuestion(item);
  return makePrefToCapitalQuestion(item);
}

var lastRegionPref = "";
function makeRegionQuestion() {
  var item;
  do {
    item = geoPool[rand(geoPool.length)];
  } while (item[0] === lastRegionPref && geoPool.length > 1);
  lastRegionPref = item[0];
  var correct = item[2];
  var wrongs = shuffle(GEO_REGIONS.filter(function(r) { return r !== correct; })).slice(0, 3);
  return {
    label: "何地方の とどうふけんかな?",
    main: item[0],
    big: item[0].length <= 4,
    answer: correct,
    choices: shuffle([correct, wrongs[0], wrongs[1], wrongs[2]])
  };
}

function makeSymbolQuestion() {
  var d = difficulty();
  if (symbolDeck.length === 0 || symbolDeckTier !== d) {
    symbolPool = d === 2 ? SYM_MED.concat(SYM_HARD) :
                 d === 1 ? SYM_MED.slice() :
                           SYM_EASY.slice();
    symbolDeck = shuffle(symbolPool.slice());
    symbolDeckTier = d;
  }
  var item = symbolDeck.pop();
  var wrongs = shuffle(symbolPool.filter(function(e) { return e !== item; }))
    .slice(0, 3).map(function(e) { return e.name; });
  return {
    label: "この ちずきごうは なに?",
    main: item.html,
    big: false,
    symbol: true,
    answer: item.name,
    choices: shuffle([item.name, wrongs[0], wrongs[1], wrongs[2]])
  };
}

function makeCountryQuestion() {
  var d = difficulty();
  if (countryDeck.length === 0 || countryDeckTier !== d) {
    countryPool = d === 2 ? COUNTRY_MED.concat(COUNTRY_HARD) :
                  d === 1 ? COUNTRY_MED.slice() :
                            COUNTRY_EASY.slice();
    countryDeck = shuffle(countryPool.slice());
    countryDeckTier = d;
  }
  var item = countryDeck.pop();
  var wrongs = shuffle(countryPool.filter(function(e) { return e !== item; }))
    .slice(0, 3).map(function(e) { return e[0]; });
  return {
    label: "この ヒントの 国は どこ?",
    main: item[1],
    big: false,
    text: true,
    answer: item[0],
    choices: shuffle([item[0], wrongs[0], wrongs[1], wrongs[2]])
  };
}

function makePrefToCapitalQuestion(item) {
  var wrongs = pickGeoDistractors(item, 1);
  return {
    label: "けんちょうしょざいちは どこ?",
    main: item[0],
    big: item[0].length <= 4,
    answer: item[1],
    choices: shuffle([item[1], wrongs[0], wrongs[1], wrongs[2]])
  };
}

function makeCapitalToPrefQuestion(item) {
  var wrongs = pickGeoDistractors(item, 0);
  return {
    label: "どの とどうふけんの けんちょうしょざいちかな?",
    main: item[1],
    big: item[1].length <= 4,
    answer: item[0],
    choices: shuffle([item[0], wrongs[0], wrongs[1], wrongs[2]])
  };
}

function pickGeoDistractors(item, field) {
  var others = geoPool.filter(function(e) {
    if (e === item) return false;
    // 「東京」だけ「市」が つかず 見た目が うくので、こたえが 東京の ときだけ こうほに する
    if (field === 1 && e[1] === "東京" && item[1] !== "東京") return false;
    return true;
  });
  var target = item[field];
  var sameLen = others.filter(function(e) { return e[field].length === target.length; });
  var pool = sameLen.length >= 3 ? sameLen : others;
  return shuffle(pool.slice()).slice(0, 3).map(function(e) { return e[field]; });
}

/* ==================== えいご ==================== */
function enWordHtml(word, kana) {
  return '<span class="enWord"><span class="enMain">' + word +
    '</span><span class="enKana">' + kana + '</span></span>';
}
// いみ(日本語)を メインに、下に えいご + カタカナよみを そえる せんたくし
function enMeaningHtml(ja, word, kana) {
  return '<span class="enWord"><span class="enMain enMainJa">' + ja +
    '</span><span class="enKana">' + word + ' / ' + kana + '</span></span>';
}

function makeEnglishQuestion() {
  var d = difficulty();
  if (enDeck.length === 0 || enDeckTier !== d) {
    enPool = d === 2 ? EN_MED.concat(EN_HARD) :
             d === 1 ? EN_MED.slice() :
                       EN_EASY.slice();
    enDeck = shuffle(enPool.slice());
    enDeckTier = d;
  }
  var item = enDeck.pop();
  // えいご→いみ と いみ→えいご を 半分ずつ だす
  if (rand(2) === 0) return makeMeaningToEnQuestion(item);
  return makeEnToMeaningQuestion(item);
}

function makeEnToMeaningQuestion(item) {
  // item = [えいご, カタカナ, いみ, [まちがい1,2,3]]
  // もんだいちゅうは いみ(日本語)だけを みせ、こたえた あとに 全せんたくしへ
  // えいご+カタカナよみを だす (先に みえると こたえが わかってしまうため)。
  // そのため まちがいも えいご・よみを もつ プールの ほかの語から えらぶ。
  var others = shuffle(enPool.filter(function(e) {
    return e[0] !== item[0] && e[2] !== item[2];
  })).slice(0, 3);
  var opts = [item].concat(others).map(function(e) {
    return { val: e[2], html: enMeaningHtml(e[2], e[0], e[1]) };
  });
  opts = shuffle(opts);
  return {
    label: "この えいごの いみは?",
    main: enWordHtml(item[0], item[1]),
    mainHtml: true,
    enQ: true,
    answer: item[2],
    answerLabel: item[2] + " (" + item[0] + " / " + item[1] + ")",
    choices: opts.map(function(o) { return o.val; }),
    choicesHtml: opts.map(function(o) { return o.html; }),
    // よみの行は 場所だけ とっておき、こたえた あとに 見えるようにする
    hideReadingUntilAnswer: true
  };
}

function makeMeaningToEnQuestion(item) {
  // いみ(日本語)を みせて えいごを えらばせる。せんたくしには カタカナよみを つける。
  var others = shuffle(enPool.filter(function(e) {
    return e[0] !== item[0] && e[2] !== item[2];
  })).slice(0, 3);
  var opts = [item].concat(others).map(function(e) {
    return { val: e[0], html: enWordHtml(e[0], e[1]) };
  });
  opts = shuffle(opts);
  return {
    label: "「" + item[2] + "」を えいごで?",
    main: item[2],
    big: item[2].length <= 5,
    answer: item[0],
    answerLabel: item[0] + " (" + item[1] + ")",
    choices: opts.map(function(o) { return o.val; }),
    choicesHtml: opts.map(function(o) { return o.html; })
  };
}

/* ==================== しゅつだい・かいとう ==================== */
var currentQ = null;

function nextQuestion() {
  currentQ = makeQuestion();
  $("questionLabel").textContent = currentQ.label;
  var qm = $("questionMain");
  qm.classList.toggle("kanjiBig", !!currentQ.big);
  qm.classList.toggle("textQ", !!currentQ.text);
  qm.classList.toggle("symbolQ", !!currentQ.symbol);
  qm.classList.toggle("enQ", !!currentQ.enQ);
  if (currentQ.symbol || currentQ.mainHtml) {
    qm.innerHTML = currentQ.main;
  } else {
    qm.textContent = currentQ.main;
  }
  $("message").textContent = "";
  $("message").className = "";
  for (var i = 0; i < 4; i++) {
    var b = choiceBtns[i];
    b.className = "choiceBtn";
    // よみを こたえた あとに だす もんだいでは、いまは よみを かくしておく
    // (行の 場所は とっておくので レイアウトは うごかない)
    if (currentQ.hideReadingUntilAnswer) b.classList.add("hideReading");
    b.disabled = false;
    // dataset.val に せいかいはんてい用の あたいを もつ (フリガナ付き表示でも マッチできるように)
    b.setAttribute("data-val", currentQ.choices[i]);
    if (currentQ.choicesHtml) {
      b.innerHTML = currentQ.choicesHtml[i];
    } else {
      b.textContent = currentQ.choices[i];
    }
  }
  busy = false;
}

function answer(idx) {
  if (busy || !currentQ) return;
  busy = true;
  ensureAudio();
  var picked = choiceBtns[idx].getAttribute("data-val");
  var isCorrect = picked === currentQ.answer;

  choiceBtns.forEach(function(b) { b.disabled = true; });

  // こたえた あとに よみを だす もんだい (えいご→いみ) では、ここで かくしていた
  // よみ (えいご+カタカナ) を 全せんたくしに 見えるようにする。
  if (currentQ.hideReadingUntilAnswer) {
    choiceBtns.forEach(function(b) { b.classList.remove("hideReading"); });
  }

  if (isCorrect) {
    choiceBtns[idx].classList.add("correct");
    onCorrect();
  } else {
    choiceBtns[idx].classList.add("wrong");
    // せいかいのボタンを ひからせる
    choiceBtns.forEach(function(b) {
      if (b.getAttribute("data-val") === currentQ.answer) b.classList.add("correct");
    });
    onWrong();
  }
}

function onCorrect() {
  SFX.correct();
  state.combo++;
  if (state.combo > state.maxCombo) state.maxCombo = state.combo;

  var dmg = 10 + Math.min(state.combo, 10) * 2;
  var crit = state.combo > 0 && state.combo % 5 === 0;
  if (crit) dmg = Math.floor(dmg * 1.5);
  state.monsterHp -= dmg;
  state.score += 100 + Math.min(state.combo, 20) * 20;

  var msg = $("message");
  msg.textContent = crit ? "クリティカル! すごい!!" : ["せいかい!", "やったね!", "いいぞ!", "すごい!"][rand(4)];
  msg.className = "good";

  popDamage("-" + dmg, crit ? "#ff80ab" : null);
  var box = $("monsterBox");
  box.classList.remove("shake", "appear", "attack");
  void box.offsetWidth;
  box.classList.add("shake");

  updateMonsterHp();
  updateHud();

  if (state.monsterHp <= 0) {
    defeatMonster();
  } else {
    setTimeout(function() { if (!state.ended) nextQuestion(); }, 900);
  }
}

function onWrong() {
  SFX.wrong();
  state.combo = 0;

  var msg = $("message");
  msg.textContent = "おしい! こたえは「" + (currentQ.answerLabel || currentQ.answer) + "」だよ";
  msg.className = "bad";
  updateHud();

  // モンスターの こうげき
  setTimeout(function() {
    if (state.ended) return;
    SFX.hurt();
    var box = $("monsterBox");
    box.classList.remove("shake", "appear", "attack");
    void box.offsetWidth;
    box.classList.add("attack");
    var pa = $("playerArea");
    pa.classList.remove("hurt");
    void pa.offsetWidth;
    pa.classList.add("hurt");

    state.playerHp -= state.monsterAttack;
    updatePlayerHp();

    if (state.playerHp <= 0) {
      setTimeout(function() { if (!state.ended) gameOver(); }, 700);
    } else {
      setTimeout(function() { if (!state.ended) nextQuestion(); }, 1400);
    }
  }, 700);
}

function defeatMonster() {
  SFX.win();
  state.kills++;
  var bonus = 200 + state.monsterIndex * 50;
  state.score += bonus;

  var box = $("monsterBox");
  box.classList.remove("shake", "appear", "attack");
  void box.offsetWidth;
  box.classList.add("defeated");

  // ちょっと かいふく
  var heal = 15;
  state.playerHp = Math.min(state.playerMaxHp, state.playerHp + heal);
  updatePlayerHp();

  var banner = $("winBanner");
  banner.innerHTML = "モンスターを たおした!<br><span style='font-size:15px'>ボーナス +" + bonus + " / HP +" + heal + " かいふく</span>";
  banner.style.display = "block";
  updateHud();

  setTimeout(function() {
    banner.style.display = "none";
    if (state.ended) return;
    if (state.monsterIndex + 1 >= CLEAR_LEVEL) {
      gameClear();
      return;
    }
    state.monsterIndex++;
    spawnMonster();
    nextQuestion();
  }, 1600);
}

function gameOver() {
  SFX.lose();
  showResult("over");
}

function quitGame() {
  ensureAudio();
  SFX.tap();
  showResult("quit");
}

function gameClear() {
  SFX.win();
  showResult("clear");
}

function showResult(kind) {
  state.ended = true;
  $("overlayFace").textContent = kind === "clear" ? "🏆" : (kind === "quit" ? "😊" : "😵");
  var h = $("overlayTitle");
  h.textContent = kind === "clear" ? "🎉 ゲームクリア! 🎉" : (kind === "quit" ? "おつかれさま!" : "ゲームオーバー");
  h.style.color = kind === "over" ? "#ff8a80" : "#ffd54f";
  $("btnRetry").style.display = kind === "quit" ? "none" : "block";

  $("finalScore").textContent = state.score;
  $("finalKills").textContent = state.kills;
  $("finalCombo").textContent = state.maxCombo;

  var best = getBest(state.mode);
  var isNew = state.score > best;
  if (isNew) setBest(state.mode, state.score);
  $("newRecord").style.display = isNew && state.score > 0 ? "block" : "none";

  $("overlay").style.display = "flex";
}

/* ==================== イベント ==================== */
$("btnMul").addEventListener("click", function() { startGame("mul"); });
$("btnDiv").addEventListener("click", function() { startGame("div"); });
$("btnKanji").addEventListener("click", function() { startGame("kanji"); });
$("btnGeo").addEventListener("click", function() { startGame("geo"); });
$("btnEn").addEventListener("click", function() { startGame("en"); });
choiceBtns.forEach(function(btn, i) {
  btn.addEventListener("click", function() { answer(i); });
});
$("btnQuit").addEventListener("click", function() { quitGame(); });
$("btnResetScore").addEventListener("click", onResetScore);
$("btnRetry").addEventListener("click", function() { startGame(state.mode); });
$("btnToTitle").addEventListener("click", function() { ensureAudio(); SFX.tap(); showTitle(); });

showTitle();
</script>
